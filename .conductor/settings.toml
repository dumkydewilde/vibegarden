"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
# .dev.vars (SESSION_SECRET etc.) is copied in via .worktreeinclude, so a
# fresh workspace can log in right away.
setup = "npm install && npm run db:migrate"
run_mode = "concurrent"

[scripts.run.dev]
command = "npm run dev -- --port $CONDUCTOR_PORT"
default = true
icon = "sprout"

[scripts.run.test]
command = "npm test"
icon = "test-tube"
